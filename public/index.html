<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UAC — Uzbek Association of Chemistry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('/back.jpg') center/cover no-repeat; opacity: 0.25; z-index: -1; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .logo { font-size: 1.6em; font-weight: 800; background: linear-gradient(135deg, #22c55e, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-btn { padding: 10px 20px; background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.5); border-radius: 10px; color: #86efac; font-weight: 600; text-decoration: none; margin-left: 10px; }
        .hero { text-align: center; padding: 100px 20px 60px; }
        .hero h1 { font-size: 3em; margin-bottom: 15px; background: linear-gradient(135deg, #e0e0e0, #86efac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: #94a3b8; font-size: 1.2em; margin-bottom: 40px; }
        .cta { padding: 16px 40px; background: linear-gradient(135deg, #22c55e, #10b981); color: white; font-size: 1.2em; font-weight: 700; border-radius: 14px; text-decoration: none; }
        .footer { text-align: center; padding: 30px; color: #475569; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <nav class="navbar">
        <div class="logo">UAC</div>
        <div>
            <a href="/login" class="nav-btn">Войти</a>
            <a href="/register" class="nav-btn">Регистрация</a>
        </div>
    </nav>
    <div class="hero">
        <h1>Uzbek Association of Chemistry</h1>
        <p>Исследуй химию через задачи, зарабатывай Омега-газ и Каппа-газ</p>
        <a href="/register" class="cta">🚀 Присоединиться</a>
    </div>
    <div class="footer">UAC © 2024 — Uzbek Association of Chemistry</div>
</body>
</html>
