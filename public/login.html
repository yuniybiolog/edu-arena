<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — UAC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('/back.jpg') center/cover no-repeat;
            opacity: 0.2;
            z-index: -1;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10,10,15,0.9), rgba(20,20,40,0.8));
            z-index: -1;
        }
        .form-container {
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h2 {
            color: #86efac;
            margin-bottom: 8px;
            font-size: 1.8em;
        }
        .subtitle {
            color: #64748b;
            font-size: 0.9em;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: rgba(34,197,94,0.5);
        }
        input::placeholder {
            color: #475569;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(34,197,94,0.3);
        }
        .links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .links a {
            color: #22c55e;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .links a:hover {
            color: #4ade80;
        }
        .divider {
            color: #475569;
            margin: 0 5px;
        }
        .error {
            color: #ef4444;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="form-container">
        <h2>Вход</h2>
        <p class="subtitle">Добро пожаловать в Uzbek Association of Chemistry</p>

        <input id="username" placeholder="Логин" autocomplete="username">
        <input id="password" type="password" placeholder="Пароль" autocomplete="current-password">

        <div class="error" id="error"></div>

        <button onclick="login()">Войти</button>

        <div class="links">
            <a href="/forgot">Забыли пароль?</a>
            <span>
                <a href="/register">Создать аккаунт</a>
                <span class="divider">|</span>
                <a href="/">Главная</a>
            </span>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!username || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.token) {
                localStorage.setItem('token', data.token);
                window.location.href = '/app';
            } else {
                errorDiv.textContent = data.error || 'Неверный логин или пароль';
                errorDiv.style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
